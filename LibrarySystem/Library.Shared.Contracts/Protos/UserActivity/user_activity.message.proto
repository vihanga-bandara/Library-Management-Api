syntax = "proto3";

package libary.useractivity.v1;

option csharp_namespace = "Library.Shared.Contracts.UserActivity.V1";

import "google/protobuf/timestamp.proto";

message GetTopBorrowersRequest {
  google.protobuf.Timestamp start_date = 1;
  google.protobuf.Timestamp end_date = 2;
  int32 limit = 3;
}

message GetTopBorrowersResponse {
  repeated UserSummary top_borrowers = 1;
}

message GetUserReadingPaceRequest {
  string user_id = 1;
  string book_id = 2;
}

message GetUserReadingPaceResponse {
  string user_id = 1;
  string book_id = 2;
  double pages_per_day = 3;
}

message UserSummary {
  string user_id = 1;
  string name = 2;
  int32 total_borrowed_books = 3;
}